name: Run project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Start backend
        env:
          PORT: 3000
        run: |
          node backend/server.js > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for backend healthcheck
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time"
          cat server.log
          exit 1

      - name: Check frontend page is served
        run: |
          curl --fail --silent http://127.0.0.1:3000/ | grep -qi "<html"

      - name: Stop backend
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: server.log
